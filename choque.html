<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Video Pantalla Completa</title>
  <style>
    /* Quitar márgenes y ajustar todo */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    /* Contenedor del video */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    /* Video ocupa toda la pantalla */
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* importante */
    }

    /* Contenido encima del video */
    .contenido {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
      font-size: 2rem;
      font-family: Arial, sans-serif;
    }
    #final-text {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 60px;
      font-family: Arial, sans-serif;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #final-text.show {
      opacity: 1;
    }

    #final-reason {
      position: fixed;
      left: 50%;
      top: 62%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 900px;
      text-align: center;
      color: #dddddd;
      font-size: 24px;
      font-family: Arial, sans-serif;
      z-index: 11;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #final-reason.show {
      opacity: 1;
    }

    #go-home-btn {
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      z-index: 11;
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #go-home-btn.show {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video autoplay>
      <source id="videoSource" src="videos-finales/choque.mp4" type="video/mp4">
      Tu navegador no soporta video.
    </video>
  </div>
  <div id="final-text">t'has xocat</div>
  <div id="final-reason"></div>
  <button id="go-home-btn" onclick="window.location.href='index.html'">Tornar a l'inici</button>

  <script>
  const video = document.querySelector("video");
  const videoSource = document.getElementById("videoSource");
  const finalText = document.getElementById("final-text");
  const finalReason = document.getElementById("final-reason");
  const goHomeBtn = document.getElementById("go-home-btn");

  // Obtener vehículo de la URL
  const params = new URLSearchParams(window.location.search);
  const vehicle = params.get('vehicle') || 'default';
  const reason = params.get('reason');
  const road = params.get('road');

  function roadLabel(value) {
    if (!value) return "";
    if (value === "urbana") return "urbana";
    if (value === "interurbana") return "interurbana";
    if (value === "travesia") return "travessia";
    return value;
  }

  if (reason) {
    const roadText = roadLabel(road);
    finalReason.textContent = roadText ? `${reason} (Via ${roadText})` : reason;
  } else {
    finalReason.textContent = "No has respectat les condicions de seguretat i has acabat en accident.";
  }

  // Seleccionar video según vehículo 
  let videoFile = 'videos-finales/choque.mp4';
  if (vehicle.toLowerCase() === 'motocicleta') {
    videoFile = 'videos-finales/choque-moto.mp4';
  } else if (vehicle.toLowerCase() === 'vmp') {
    videoFile = 'videos-finales/choque-vmp.mp4';
  }
  else if (vehicle.toLowerCase() === 'ciclos') {
    videoFile = 'videos-finales/choque-bicicleta.mp4';
  }

    else if (vehicle.toLowerCase() === 'camiones') {
    videoFile = 'videos-finales/choque-camion.mp4';
  }

  videoSource.src = videoFile;
  video.load();

  video.addEventListener("ended", () => {
    finalText.classList.add("show");
    finalReason.classList.add("show");
    goHomeBtn.classList.add("show");
  });
  </script>
</body>
</html>
