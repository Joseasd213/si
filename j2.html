<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            flex-direction: column;
            justify-content: center;
            display: flex;
        }
        .calculator{
            border: solid;
            justify-content: center;
            flex-wrap: wrap;
            display: flex;
            max-width: 350px;
            background-color: cyan;
            border-radius: 5px;
        }
        .number{
            border: solid;
            padding: 35px;
            margin: 10px;
            max-width: 30px;
            background-color: rgb(201, 255, 255);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="calculator"></div>
    <input id="input" type="number" placeholder="Numero">
    <button id="btn">CLICK</button>


    <script>
    const btn = ("#btn")
    const input = ("#input")
    let divNumeros = ""

        document.querySelector("#input")
        for (let cont = 1; cont<=9; cont++){
            divNumeros=divNumeros + `<div class = "number" id = ${cont} > ${cont} </div>`
        }
        document.querySelector(".calculator").innerHTML = divNumeros
        
        function valor (){
            console.log (input.value)
        }
        document.querySelector("#btn").addEventListener ("click", valor)

        
    </script>
</body>
</html>
