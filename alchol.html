<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Video Pantalla Completa</title>
  <style>
    /* Quitar márgenes y ajustar todo */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    /* Contenedor del video */
    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    /* Video ocupa toda la pantalla */
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* importante */
    }

    /* Contenido encima del video */
    .contenido {
      position: relative;
      z-index: 1;
      color: white;
      text-align: center;
      top: 40%;
      font-size: 2rem;
      font-family: Arial, sans-serif;
    }
    #final-text {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 60px;
      font-family: Arial, sans-serif;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #final-text.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video autoplay muted>
      <source id="videoSource" src="videos-finales/alchol.mp4" type="video/mp4">
      Tu navegador no soporta video.
    </video>
  </div>
  <div id="final-text">Bebistes demasiado</div>

  <script>
  const video = document.querySelector("video");
  const videoSource = document.getElementById("videoSource");
  const finalText = document.getElementById("final-text");

  // Obtener vehículo de la URL
  const params = new URLSearchParams(window.location.search);
  const vehicle = params.get('vehicle') || 'default';

  // Seleccionar video según vehículo
  let videoFile = 'videos-finales/alchol.mp4';
  if (vehicle.toLowerCase() === 'motocicleta') {
    videoFile = 'videos-finales/moto alcohol.mp4';
  } else if (vehicle.toLowerCase() === 'vmp') {
    videoFile = 'videos-finales/VMP_alcohol.mp4';
  }

  videoSource.src = videoFile;
  video.load();

  video.addEventListener("ended", () => {
    finalText.classList.add("show");
  });
  </script>
</body>
</html>
